name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          # Keep in step with mix.exs (elixir: "~> 1.20").
          otp-version: "29"
          elixir-version: "1.20"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

  console-release:
    name: Build console release
    runs-on: ubuntu-latest

    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-prod-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-prod-

      - name: Install dependencies
        run: mix deps.get --only prod

      # Build the assets + assemble the release, exactly as the console image /
      # tarball do — so a broken prod endpoint config, asset build, or release
      # definition fails CI instead of a release tag.
      - name: Build assets and release
        run: |
          mix esbuild.install --if-missing
          mix esbuild aether_console --minify
          mix release aether_console

  e2e-same-host:
    name: E2E (same-host multi-node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Verify S3 client (aws-cli)
        run: aws --version

      - name: Run same-host multi-node e2e
        run: bash test/e2e/same_host.sh

  e2e-presign:
    name: E2E (presigned URLs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Verify S3 client (aws-cli)
        run: aws --version

      - name: Run presigned-URL e2e
        run: bash test/e2e/presign.sh

  e2e-docker:
    name: E2E (docker cluster)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships Docker + the compose plugin; the amazon/aws-cli image
      # (the S3 client) is pulled by the script at runtime.
      - name: Run docker cluster e2e
        run: bash test/e2e/docker_cluster.sh

  e2e-split-brain:
    name: E2E (split-brain recovery)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Partitions a 3-node cluster (iptables sidecar in node 3's netns) and
      # proves control-plane resync + data-plane LWW convergence on heal. Pulls
      # amazon/aws-cli (S3 client) and nicolaka/netshoot (iptables) at runtime.
      - name: Run split-brain e2e
        run: bash test/e2e/split_brain.sh

  e2e-rebalance:
    name: E2E (rebalancing on topology change)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Grows a 3-node cluster to 5 and asserts anti-entropy migrates objects to
      # new owners AND sheds orphans (total copies stays = objects × RF).
      - name: Run rebalance e2e
        run: bash test/e2e/rebalance.sh

  e2e-converge:
    name: E2E (kill-then-return convergence)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Kills a replica in a 5-node RF=3 cluster (a temp owner restores RF), then
      # returns it and asserts the temp owner sheds so every object settles back to
      # exactly RF copies on its original HRW owners — the shed path rebalance.sh
      # (grow-only) never exercises.
      - name: Run convergence e2e
        run: bash test/e2e/converge.sh

  e2e-reap:
    name: E2E (incomplete-MPU reaping)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Starts a multipart upload without completing it and proves the reaper
      # sweeps its parts + marker once past the age grace (and not before).
      - name: Run reap e2e
        run: bash test/e2e/reap.sh

  e2e-warp:
    name: E2E (warp concurrent workload)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Drives the cluster with warp (concurrent PUT/GET/STAT/DELETE). warp
      # verifies size + etag on every read, so a run with zero errors proves
      # real round-trip correctness under load. minio/warp is pulled at runtime.
      - name: Run warp e2e
        run: bash test/e2e/warp.sh
