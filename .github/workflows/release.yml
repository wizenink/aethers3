name: release

# Cut a release by pushing a tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
# Builds native mix-release tarballs for every target, publishes multi-arch
# Docker images to Docker Hub, and attaches the tarballs to a GitHub Release.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  - Docker Hub account; also the image namespace
#   DOCKERHUB_TOKEN     - a Docker Hub access token (not the password)
# GITHUB_TOKEN is provided automatically for the release upload.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        # On a tag, version = tag without the leading "v". Otherwise (manual
        # dispatch) derive a -dev version from mix.exs so artifacts still name.
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            mix_v=$(grep -m1 'version:' mix.exs | sed -E 's/.*"([^"]+)".*/\1/')
            echo "version=${mix_v}-dev+${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

  build-linux:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, runner: ubuntu-latest, libc: gnu, image: "elixir:1.20-otp-29-slim" }
          - { arch: x86_64, runner: ubuntu-latest, libc: musl, image: "elixir:1.20-otp-29-alpine" }
          - { arch: aarch64, runner: ubuntu-24.04-arm, libc: gnu, image: "elixir:1.20-otp-29-slim" }
          - { arch: aarch64, runner: ubuntu-24.04-arm, libc: musl, image: "elixir:1.20-otp-29-alpine" }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # Build inside the target image via `docker run` (not `container:`) so the
      # checkout/upload actions keep running on the glibc host — Alpine/musl
      # containers can't run the node-based actions GitHub injects. The runner's
      # architecture selects the native image variant (no emulation).
      - name: Build release (${{ matrix.arch }}-${{ matrix.libc }})
        run: |
          docker run --rm -v "$PWD":/src -w /src -e MIX_ENV=prod "${{ matrix.image }}" sh -c '
            set -eu
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache git tar xz
            else
              apt-get update && apt-get install -y --no-install-recommends git tar xz-utils ca-certificates
            fi
            mix local.hex --force
            mix local.rebar --force
            mix deps.get --only prod
            mix rel'

      - name: Package tarball
        run: |
          sudo chown -R "$(id -u):$(id -g)" _build
          name="aether_s3-${{ needs.prepare.outputs.version }}-linux-${{ matrix.arch }}-${{ matrix.libc }}"
          tar -czf "${name}.tar.gz" -C _build/prod/rel aether_s3
          echo "ASSET=${name}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  build-macos:
    needs: prepare
    runs-on: macos-26 # macOS 26 (Tahoe), Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4
      # mise reads mise.toml (erlang + elixir pinned to OTP 29, matching the
      # Linux/Docker builds). Erlang compiles from source on macOS (~15 min the
      # first time; mise-action caches it across runs).
      - uses: jdx/mise-action@v2
      - name: Build release
        env:
          MIX_ENV: prod
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod
          mix rel
      - name: Package tarball
        run: |
          name="aether_s3-${{ needs.prepare.outputs.version }}-macos-aarch64"
          tar -czf "${name}.tar.gz" -C _build/prod/rel aether_s3
          echo "ASSET=${name}.tar.gz" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  docker:
    needs: prepare
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aether_s3:${{ needs.prepare.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/aether_s3:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-console:
    needs: prepare
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.console
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aether_console:${{ needs.prepare.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/aether_console:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [prepare, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
