name: aether-static5

# 5-node stable-name cluster, for testing a split-brain that produces TWO
# multi-node sides (e.g. 3 vs 2) rather than majority + a lone node. Same shape as
# docker-compose.static.yml, with five services. Drive it via test/e2e/split_brain.sh:
#
#   SB_COMPOSE=docker-compose.static5.yml SB_PROJECT=aether-split5 \
#   SB_MAJORITY="1 2 3" SB_MINORITY="4 5" test/e2e/split_brain.sh

x-aether-env: &aether-env
  RELEASE_COOKIE: dev-cluster-cookie
  RELEASE_DISTRIBUTION: name
  AETHER_PEERS: "aether@aether1.aethr,aether@aether2.aethr,aether@aether3.aethr,aether@aether4.aethr,aether@aether5.aethr"
  AETHER_REQUIRE_AUTH: "false"
  AETHER_DATA_DIR: /data
  AETHER_PORT: "9000"
  AETHER_WRITE_QUORUM: "${AETHER_WRITE_QUORUM:-2}"
  AETHER_CP_EVICT_GRACE: "${AETHER_CP_EVICT_GRACE:-}"

services:
  aether1:
    build: .
    restart: unless-stopped
    hostname: aether1.aethr
    environment:
      <<: *aether-env
      RELEASE_NODE: aether@aether1.aethr
    networks:
      aether:
        aliases: [aether1.aethr]
    volumes:
      - aether1_data:/data

  aether2:
    build: .
    restart: unless-stopped
    hostname: aether2.aethr
    environment:
      <<: *aether-env
      RELEASE_NODE: aether@aether2.aethr
    networks:
      aether:
        aliases: [aether2.aethr]
    volumes:
      - aether2_data:/data

  aether3:
    build: .
    restart: unless-stopped
    hostname: aether3.aethr
    environment:
      <<: *aether-env
      RELEASE_NODE: aether@aether3.aethr
    networks:
      aether:
        aliases: [aether3.aethr]
    volumes:
      - aether3_data:/data

  aether4:
    build: .
    restart: unless-stopped
    hostname: aether4.aethr
    environment:
      <<: *aether-env
      RELEASE_NODE: aether@aether4.aethr
    networks:
      aether:
        aliases: [aether4.aethr]
    volumes:
      - aether4_data:/data

  aether5:
    build: .
    restart: unless-stopped
    hostname: aether5.aethr
    environment:
      <<: *aether-env
      RELEASE_NODE: aether@aether5.aethr
    networks:
      aether:
        aliases: [aether5.aethr]
    volumes:
      - aether5_data:/data

volumes:
  aether1_data:
  aether2_data:
  aether3_data:
  aether4_data:
  aether5_data:

networks:
  aether: {}
